<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ECharts饼图模板</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f7fa;
            padding: 20px;
            min-height: 100vh;
        }
        .chart-container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            padding: 20px;
            margin: 0 auto;
            max-width: 900px;
            height: 500px;
        }
        #chart { width: 100%; height: 100%; }
    </style>
</head>
<body>
    <div class="chart-container">
        <div id="chart"></div>
    </div>
    <script>
        var chartDom = document.getElementById('chart');
        var myChart = echarts.init(chartDom);
        
        var option = {
            title: {
                text: '产品销售占比',
                left: 'center',
                textStyle: { fontSize: 18 }
            },
            tooltip: {
                trigger: 'item',
                formatter: '{b}: {c} ({d}%)'
            },
            legend: {
                orient: 'vertical',
                right: '5%',
                top: 'center',
                data: ['电子产品', '服装', '食品', '家居', '其他']
            },
            color: ['#5470c6', '#91cc75', '#fac858', '#ee6666', '#73c0de'],
            series: [
                {
                    name: '销售占比',
                    type: 'pie',
                    radius: ['40%', '70%'],
                    center: ['40%', '50%'],
                    avoidLabelOverlap: false,
                    itemStyle: {
                        borderRadius: 10,
                        borderColor: '#fff',
                        borderWidth: 2
                    },
                    label: {
                        show: true,
                        formatter: '{b}: {d}%',
                        fontSize: 12
                    },
                    labelLine: {
                        show: true,
                        lineStyle: { color: '#999' }
                    },
                    data: [
                        { value: 35, name: '电子产品' },
                        { value: 25, name: '服装' },
                        { value: 18, name: '食品' },
                        { value: 15, name: '家居' },
                        { value: 7, name: '其他' }
                    ]
                }
            ]
        };
        
        option && myChart.setOption(option);
        window.addEventListener('resize', function() { myChart.resize(); });
    </script>
</body>
</html>
